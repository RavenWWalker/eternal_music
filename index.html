<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="shortcut icon" href="favicon.ico">
    <title>Музыкальная шкатулка</title>
    <link rel="stylesheet" href="style.css">
    <script>
        (function() {
            const saved = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const theme = saved || (prefersDark ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>
<body>
    <div class="container">
        <div class="card">
            <button id="themeToggle" class="theme-toggle" aria-label="Переключить тему">
                <span class="theme-icon-light">☀️</span>
                <span class="theme-icon-dark">🌙</span>
            </button>

            <h1>🔔 Музыкальная шкатулка</h1>
            <p class="subtitle">Бесконечная процедурная мелодия</p>

            <div class="visualizer">
                <div class="circle" id="circle"></div>
            </div>

            <button id="playBtn" class="play-btn">
                <span id="btnText">▶ Включить музыку</span>
            </button>

            <div class="controls">
                <label>
                    <span>Громкость</span>
                    <input type="range" id="volume" min="0" max="100" value="50">
                </label>
                <label>
                    <span>Темп</span>
                    <input type="range" id="tempo" min="50" max="150" value="100">
                </label>
            </div>

            <div class="status" id="status">Нажмите кнопку, чтобы начать</div>
        </div>

        <div class="info">
            <p>Каждое прослушивание уникально — мелодия рождается прямо сейчас</p>
            <a href="https://github.com/RavenWWalker/eternal_music" target="_blank">Исходный код на GitHub</a>
        </div>
    </div>

    <script src="music.js"></script>
    <script>
        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        });
    </script>
</body>
</html>
